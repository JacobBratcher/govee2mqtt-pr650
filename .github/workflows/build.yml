name: Build & Publish

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly rebuild in case manuveli's fork gets updated
    - cron: "0 6 * * 1"

env:
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Lowercase image name
        id: img
        run: echo "name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          # amd64-only — HA runs on a Proxmox VM (x86_64).
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ steps.img.outputs.name }}:latest
            ghcr.io/${{ steps.img.outputs.name }}:pr650
          cache-from: type=gha
          cache-to: type=gha,mode=max
