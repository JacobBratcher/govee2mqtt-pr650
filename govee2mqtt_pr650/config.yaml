name: Govee to MQTT Bridge (PR650)
version: "1.0.0"
slug: govee2mqtt_pr650
description: Govee to MQTT bridge built from manuveli PR #650 (APP_VERSION 7.4.10)
url: https://github.com/JacobBratcher/govee2mqtt-pr650
arch:
  - amd64
init: false
startup: services
services:
  - mqtt:need

apparmor: false

webui: http://[HOST]:[PORT:8056]/assets/index.html

# Host network access is required for LAN discovery
host_network: true

map:
  - type: addon_config
    read_only: false
    path: /app/config

options:
  temperature_scale: "C"

schema:
  temperature_scale: "str?"
  govee_email: "str?"
  govee_password: "password?"
  govee_api_key: "password?"
  mqtt_host: "str?"
  mqtt_port: "int?"
  mqtt_username: "str?"
  mqtt_password: "password?"
  debug_level: "str?"
  no_multicast: "bool?"
  broadcast_all: "bool?"
  global_broadcast: "bool?"
  scan: "str?"
